name: CI

# cl-kit is Windows 11 only. The suite runs the platform-neutral core (account
# switching, per-account credential isolation, trash, usage, the fridge) plus the
# Windows key path (a real DPAPI round-trip) on a windows-latest runner. It uses a
# throwaway HOME and no interactive `claude`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (windows · node ${{ matrix.node }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run test suite
        run: node test/run.js
